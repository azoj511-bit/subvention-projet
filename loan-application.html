<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demande de Prêt | Subvention Projet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .contact-form {
            background-color: var(--bg-card);
            padding: 50px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 800px;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            color: var(--text-primary);
            border-radius: 4px;
            font-family: inherit;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-anchor icon-logo"></i> SUBVENTION PROJET
            </a>
            <div class="nav-right">
                <div class="gtranslate_wrapper"></div>
                <button class="mobile-menu-btn"><i class="fa-solid fa-bars"></i></button>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">HOME</a></li>
                <li><a href="services.html">SERVICES</a></li>
                <li><a href="loan-application.html" class="active">LOAN APPLICATION</a></li>
                <li><a href="about-us.html">ABOUT US</a></li>
                <li><a href="contact-us.html">CONTACT US</a></li>
            </ul>
        </div>
    </nav>

    <a href="https://wa.me/33757756283" target="_blank" class="whatsapp-float"><i class="fa-brands fa-whatsapp"></i></a>

    <!-- Page Header -->
    <header class="page-header" style="background: url('https://subventionprojet.com/wp-content/uploads/2019/10/finance-sub.jpg') center/cover; padding: 100px 0; text-align: center; position: relative;">
        <div class="hero-overlay" style="background: rgba(0,0,0,0.4);"></div>
        <div class="container" style="position: relative; z-index: 2;">
            <h1 style="font-family: var(--font-heading); font-size: 3rem;">Demande de Prêt</h1>
            <p style="color: var(--accent-gold);">Home > Loan Application</p>
        </div>
    </header>

    <section class="section-padding">
        <div class="container">
            <div class="section-title text-center">
                <span class="subtitle">Procédure simple et rapide</span>
                <h2 style="font-family: var(--font-heading); margin-bottom: 30px;">Formulaire de Demande</h2>
            </div>
            
            <form id="loanForm" class="contact-form">
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">Nom et Prénom</label>
                        <input type="text" id="loanName" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Adresse Email</label>
                        <input type="email" id="loanEmail" class="form-control" required>
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">Numéro de téléphone</label>
                        <input type="tel" id="loanPhone" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Situation Professionnelle</label>
                        <select id="loanJob" class="form-control" required>
                            <option value="">Sélectionnez...</option>
                            <option value="Employé">Employé</option>
                            <option value="Indépendant">Indépendant(e)</option>
                            <option value="Sans-emploi">Sans-emploi</option>
                            <option value="Retraité">Retraité(e)</option>
                            <option value="Entreprise">Entreprise</option>
                        </select>
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">Montant souhaité (€)</label>
                        <input type="number" id="loanAmount" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Durée du prêt (Mois)</label>
                        <input type="number" id="loanDuration" class="form-control" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Type de prêt</label>
                    <select id="loanType" class="form-control" required>
                        <option value="">Sélectionnez...</option>
                        <option value="Projet">Financement de Projet</option>
                        <option value="Immobilier">Immobilier</option>
                        <option value="Automobile">Automobile</option>
                        <option value="Personnel">Personnel</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Informations Complémentaires</label>
                    <textarea id="loanMessage" class="form-control" rows="4"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Soumettre la demande via Gmail <i class="fa-solid fa-paper-plane" style="margin-left: 8px;"></i></button>
            </form>
        </div>
    </section>

    <footer class="footer">
        <div class="container text-center">
            <p>&copy; 2026 Subvention Projet.</p>
        </div>
    </footer>
    <script>
    window.gtranslateSettings = {
        "default_language": "fr",
        "languages": ["fr", "en", "it", "es", "pt", "de", "hu", "ro", "sk"],
        "wrapper_selector": ".gtranslate_wrapper"
    };
    </script>
    <script src="https://cdn.gtranslate.net/widgets/latest/dwf.js" defer></script>
    <script src="js/main.js"></script>
</body>
</html>
